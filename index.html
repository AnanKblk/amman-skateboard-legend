<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amman Skateboard Legend</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0a0a;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        color: #ffffff;
        font-family: monospace;
        font-size: 14px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
